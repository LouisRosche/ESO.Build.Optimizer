# Alembic Configuration for ESO Build Optimizer API
#
# Usage:
#   cd api/
#   alembic upgrade head          # Apply all migrations
#   alembic revision --autogenerate -m "description"  # Generate migration
#   alembic downgrade -1          # Rollback one migration
#   alembic history               # Show migration history
#   alembic current               # Show current revision

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Prepend sys.path with the project root so imports work
prepend_sys_path = ..

# Timezone for revision creation (UTC recommended)
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory
# sourceless = false

# Version number format for new revisions
# version_path_separator = os
# output_encoding = utf-8

# The database URL is loaded from api.core.config in env.py,
# so we leave sqlalchemy.url empty here.
sqlalchemy.url =

[post_write_hooks]
# Hooks to run after generating a new revision
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
